name: Bug report
description: Report a reproducible crash, display, or taskbar problem
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Mac Taskbar.

        In Mac Taskbar, open **Settings > Info > Support Diagnostics** and choose **Copy Diagnostics**. Paste that text into **Support Diagnostics & Attachments** below. For crashes, **Export Diagnostics...** can also create a ZIP containing the diagnostics and, with your approval, the crash report.

        Diagnostics are designed to omit window titles, application lists, folder paths, display serial numbers, and license information. A crash report can still contain personal data, so please inspect it before attaching it to this public issue.

  - type: dropdown
    id: problem-type
    attributes:
      label: Problem type
      options:
        - Crash or unexpected quit
        - Freeze or high CPU usage
        - Display or layout problem
        - Window or taskbar behavior
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include what you expected to happen and what happened instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Every time
        - Often
        - Sometimes
        - Once
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Support Diagnostics & Attachments
